name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without leading v"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLATFORM: linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            version="$INPUT_VERSION"
          else
            version="${REF_NAME#v}"
          fi
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "invalid release version: ${version}" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Format
        run: cargo fmt --all --check

      - name: Validate release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          package_version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          cargo_toml = tomllib.loads(Path("Cargo.toml").read_text())
          print(cargo_toml["workspace"]["package"]["version"])
          PY
          )"
          release_version="$RELEASE_VERSION"
          if [ "$package_version" != "$release_version" ]; then
            echo "release version ${release_version} does not match workspace.package.version ${package_version}" >&2
            exit 1
          fi

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --workspace --all-features

      - name: Build release binaries
        run: cargo build --locked --release --workspace --bins

      - name: Package release archive
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          version="$RELEASE_VERSION"
          package="whdr-${version}-${PLATFORM}"
          mkdir -p "dist/${package}" dist/release

          for bin in whdr-server whdr whdr-ext-dev whdr-ext-github whdr-ext-teams; do
            cp "target/release/${bin}" "dist/${package}/${bin}"
          done
          cp README.md "dist/${package}/README.md"
          cp LICENSE "dist/${package}/LICENSE"
          cp LICENSE-UNLICENSE "dist/${package}/LICENSE-UNLICENSE"
          cp LICENSE-CC0 "dist/${package}/LICENSE-CC0"

          tar -czf "dist/release/${package}.tar.gz" -C dist "${package}"
          (cd dist/release && sha256sum "${package}.tar.gz" > SHA256SUMS)

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRAFT: ${{ inputs.draft }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          version="$RELEASE_VERSION"
          draft_flag=()
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_DRAFT" = "true" ]; then
            draft_flag=(--draft)
          fi
          artifacts=(dist/release/*)

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${artifacts[@]}" --clobber
          else
            gh release create "$tag" "${artifacts[@]}" \
              --target "$GITHUB_SHA" \
              --title "whdr ${version}" \
              --generate-notes \
              "${draft_flag[@]}"
          fi
